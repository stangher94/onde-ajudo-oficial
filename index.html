<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Ícones e Manifest: mantém a miniatura ao compartilhar/instalar, sem tela de carregamento extra -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ceaa82" />

    <!-- Título do site que aparece nas abas e no Google -->
    <title>Onde Ajudo? | Apoie Instituições de Caridade Locais</title>

    <!-- Descrição padrão para os resultados de busca do Google -->
    <meta name="description" content="Encontre e apoie instituições de caridade e projetos sociais locais. Descubra como ajudar com doações, PIX ou trabalho voluntário em um só lugar." />

    <!-- Tags Open Graph (Para redes sociais e WhatsApp brilharem no compartilhamento) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Onde Ajudo? | Apoie Instituições de Caridade Locais" />
    <meta property="og:description" content="Uma plataforma simples para conectar quem quer ajudar com as principais necessidades de projetos sociais da região. Faça sua parte!" />
    <meta property="og:url" content="https://ondeajudo.com.br/" />
    <meta property="og:image" content="https://ondeajudo.com.br/og-image.png" />

    <!-- Tag opcional para o Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Onde Ajudo? | Apoie Instituições de Caridade Locais" />
    <meta name="twitter:description" content="Descubra instituições de caridade locais que precisam do seu apoio. Saiba como doar via PIX, mantimentos ou voluntariado." />

    <!-- Tailwind e Font Awesome carregados ANTES do React montar a página -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
